services:
  db:
    image: postgres:17
    container_name: adamszczotka-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adamszczotka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-adamszczotka_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adamszczotka}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
